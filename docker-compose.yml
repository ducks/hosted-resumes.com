services:
  postgres:
    image: postgres:16-alpine
    container_name: hosted-resumes-postgres
    environment:
      POSTGRES_USER: hosted_resumes
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hosted_resumes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hosted_resumes -d hosted_resumes"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hosted-resumes-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/resumes;
      mc anonymous set download local/resumes;
      "
    restart: "no"

  pdf-service:
    build: ./pdf-service
    container_name: hosted-resumes-pdf
    ports:
      - "3001:3001"
    environment:
      PDF_SERVICE_HOST: "0.0.0.0:3001"
      RUST_LOG: "pdf_service=info,tower_http=info"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - pdf

volumes:
  pgdata:
  minio-data:
