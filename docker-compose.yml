version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hosted-resumes-db
    environment:
      POSTGRES_DB: hosted_resumes_dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d hosted_resumes_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
